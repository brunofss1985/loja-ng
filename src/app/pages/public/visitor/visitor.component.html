<header class="header">
    <div class="header-logo">
        <img class="logo-img" src="../../../../assets/logo.png">
    </div>

    <div class="search-container">
        <input type="text" placeholder="O que você está procurando?" class="search-input">
    </div>

    <div class="action-buttons">
        <button [routerLink]="['/visitor/default-login/register']" type="button" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Cadastro
        </button>

        <button [routerLink]="['/visitor/default-login/login']" type="button" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
    </div>
</header>
