<div *ngIf="isOpen" class="modal-backdrop-custom">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Cadastrar usuário</h5>
          <button type="button" class="btn-close" (click)="close()" aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <app-input-text
          [inputTextPlaceholder]="'Usuário'"
          [labelName]="'Usuário'"
          ></app-input-text>
          <app-input-text
          [inputTextPlaceholder]="'Email'"
          [labelName]="'Email'"
          ></app-input-text>
          <app-input-text
          [inputTextPlaceholder]="'Senha'"
          [labelName]="'Senha'"
          ></app-input-text>
          <app-input-text
          [inputTextPlaceholder]="'Corfirmar Senha'"
          [labelName]="'Corfirmar Senha'"
          ></app-input-text>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="close()">Fechar</button>
          <button class="btn btn-primary">Salvar</button>
        </div>
      </div>
    </div>
  </div>
