<div class="card">
  <div class="card-header">
    Usuários Cadastrados
  </div>
  <div class="card-body">
    <table>
      <thead>
        <tr>
          <th *ngFor="let header of headers"
            [ngClass]="{'first': header === headers[0], 'last': header === headers[headers.length - 1]}">
            {{ header }}
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of data">
          <td *ngFor="let header of headers">
            {{ row[header] }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
